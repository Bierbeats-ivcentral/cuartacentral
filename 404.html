<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — IV CENTRAL</title>
  <link rel="icon" type="image/svg+xml" href="logo-iv-central.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 25vw, 200px);
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: .04em;
    }
    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #D4A017;
      letter-spacing: .3em;
      margin-bottom: 12px;
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 8vw, 56px);
      color: #fff;
      margin-bottom: 14px;
      line-height: 1;
    }
    .sub {
      font-size: 14px;
      color: #666;
      max-width: 360px;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btn {
      background: #D4A017;
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: .14em;
      border: none;
      border-radius: 8px;
      padding: 13px 28px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="brand">IV CENTRAL</div>
  <div class="title">FRECUENCIA<br>NO ENCONTRADA</div>
  <p class="sub">Esta página no existe o fue movida. Vuelve al inicio y sigue explorando la red.</p>
  <a href="/" class="btn">VOLVER AL INICIO</a>
</body>
</html>
