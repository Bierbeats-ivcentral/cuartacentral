# ============================================
#  IV CENTRAL — netlify.toml
#  Seguridad + Cache + Headers
#
#  FIX: Content-Security-Policy actualizada —
#  script-src ya no requiere unsafe-inline
#  (todos los scripts son externos).
#  style-src mantiene unsafe-inline solo para
#  estilos de librerías externas (Tabler icons).
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://xtdtzptqlfxkmoalnarm.supabase.co https://formspree.io https://www.google-analytics.com; frame-ancestors 'none';"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

# ── SPA REDIRECT (todas las rutas → index.html) ──
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── 404 personalizada ──────────────────────────────
[[redirects]]
  from   = "/404"
  to     = "/404.html"
  status = 404
