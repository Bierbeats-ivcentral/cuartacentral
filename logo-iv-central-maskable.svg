<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ivGoldM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Background full bleed for maskable -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Safe zone 80% = 409px, inset ~51px — all content inside -->
  <g transform="translate(256,256)">
    <!-- I symbol scaled to fit safe zone -->
    <g transform="translate(-148,-192) scale(1.25)">
      <rect x="48" y="8"  width="24" height="150" rx="2" fill="url(#ivGoldM)"/>
      <rect x="8"  y="52" width="104" height="16" rx="2" fill="url(#ivGoldM)"/>
      <rect x="30" y="66" width="12"  height="88" fill="url(#ivGoldM)"/>
      <rect x="78" y="66" width="12"  height="88" fill="url(#ivGoldM)"/>
      <polygon points="30,150 0,210 18,210 48,164"  fill="url(#ivGoldM)"/>
      <polygon points="90,150 120,210 102,210 72,164" fill="url(#ivGoldM)"/>
      <rect x="42" y="160" width="36" height="12" fill="url(#ivGoldM)"/>
      <rect x="50" y="172" width="6"  height="38" fill="url(#ivGoldM)"/>
      <rect x="64" y="172" width="6"  height="38" fill="url(#ivGoldM)"/>
    </g>
    <!-- V letter -->
    <text x="-6" y="64"
      font-family="Arial Black,Arial,sans-serif"
      font-weight="900"
      font-size="185"
      text-anchor="middle"
      fill="#ffffff">V</text>
    <!-- CENTRAL -->
    <text x="0" y="138"
      font-family="Arial Black,Arial,sans-serif"
      font-weight="900"
      font-size="47"
      letter-spacing="12"
      text-anchor="middle"
      fill="#d4a017">CENTRAL</text>
  </g>
</svg>
